        // --- 麥克風音高偵測演算法 ---
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            
            let clarity = maxval / (c[0] || 1);
            if (clarity < 0.5) { return -1; }

            let T0 = maxpos;
            if (maxpos > 0 && maxpos < SIZE - 1) {
                let y1 = c[maxpos - 1], y2 = c[maxpos], y3 = c[maxpos + 1];
                let a = (y1 + y3 - 2 * y2) / 2;
                let b = (y3 - y1) / 2;
                if (a !== 0) T0 = T0 - b / (2 * a);
            }
            
            if (T0 === 0) return -1;
            return sampleRate / T0;
        }

        function noteFromPitch(frequency) {
            if (!frequency || frequency <= 0 || frequency === Infinity || Number.isNaN(frequency)) return null;
            const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            const midiNote = Math.round(noteNum) + 69;
            if (Number.isNaN(midiNote) || midiNote < 0 || midiNote > 127) return null;
            
            const octave = Math.floor(midiNote / 12) - 1;
            const noteName = noteStrings[midiNote % 12];
            
            if (!noteName || noteName.includes('#')) return null;
            return `${noteName}${octave}`;
        }

        const playSound = (ctx, type, freq = 440) => {
            if (!ctx) return;
            if (ctx.state === 'suspended') {
                ctx.resume().catch(() => {});
            }

            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.exponentialRampToValueAtTime(110, t + 0.15);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                osc.start(t);
                osc.stop(t + 0.15);
            } else if (type === 'explosion') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, t);
                osc.frequency.exponentialRampToValueAtTime(30, t + 0.1);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t);
                osc.stop(t + 0.1);
            } else if (type === 'note') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, t);
                const volume = freq < 200 ? 0.6 : 0.4;
                gain.gain.setValueAtTime(volume, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2); 
                osc.start(t);
                osc.stop(t + 1.2);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.25);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
                osc.start(t);
                osc.stop(t + 0.25);
            }

            }, 1500);

        const Laser = ({ startX, startY, targetX, targetY }) => {
            const dx = targetX - startX;

        const StaffNote = ({ note, showName = false, svgScale = 'scale-100', isTarget = false }) => {
            const stemDirection = note.y > 60 ? 'up' : 'down';

        function PitchShooterGame() {
        
        const [loginState, setLoginState] = useState({
            isLoggedIn: false,
            mode: 'class', 
            playerClass: '',
            name: ''
        });

        const [isInitialLoading, setIsInitialLoading] = useState(true);
        const [isRefreshing, setIsRefreshing] = useState(false);
        const [assignedNotesData, setAssignedNotesData] = useState([]);
        
        const [leaderboardAllTime, setLeaderboardAllTime] = useState([]);
        const [leaderboardToday, setLeaderboardToday] = useState([]);
        const [leaderboardType, setLeaderboardType] = useState('today'); 
        
        const [classList, setClassList] = useState([]);
        
        const [showLeaderboard, setShowLeaderboard] = useState(false);
        const [activeLeaderboardTab, setActiveLeaderboardTab] = useState('訪客');

        const [selectedClefTab, setSelectedClefTab] = useState('treble'); 
        const [currentLevel, setCurrentLevel] = useState('treble_mid'); 
        const [selectedNoteIds, setSelectedNoteIds] = useState([]);
        
        const [isGameMode, setIsGameMode] = useState(false);
        const [showKeyboardHints, setShowKeyboardHints] = useState(false);

        // --- 麥克風相關 State ---
        const [isMicActive, setIsMicActive] = useState(false);
        const [currentDetectedNote, setCurrentDetectedNote] = useState(null); 
        const [isRecorderMode, setIsRecorderMode] = useState(false); 
        // -----------------------
        
        const [combo, setCombo] = useState(0);
        const [maxCombo, setMaxCombo] = useState(0);
        const [stats, setStats] = useState({ correct: 0, wrong: 0 });

        const [gameTargets, setGameTargets] = useState([]);
        const [currentTargetIndex, setCurrentTargetIndex] = useState(0); 
        const [gameScore, setGameScore] = useState(0);
        const [gameTime, setGameTime] = useState(0);
        const [gameWon, setGameWon] = useState(false);
        const [lasers, setLasers] = useState([]);
        const [wrongShake, setWrongShake] = useState(false);
        const [validationShake, setValidationShake] = useState(false);

        const [isSubmitting, setIsSubmitting] = useState(false);
        const [isSubmitted, setIsSubmitted] = useState(false);

        // --- 麥克風相關 Refs ---
        const micStreamRef = useRef(null);
        const analyserRef = useRef(null);
        const pitchRafRef = useRef(null);
        const matchFramesRef = useRef(0);
        const lastDetectedNoteRef = useRef(null);
        const bufferRef = useRef(new Float32Array(2048));
        // -----------------------

        const timerRef = useRef(null);
        const startTimeRef = useRef(0); 
        const targetRefs = useRef({}); 

        // --- 麥克風核心功能 ---
        const stopMic = useCallback(() => {
            if (pitchRafRef.current) cancelAnimationFrame(pitchRafRef.current);
            if (micStreamRef.current) {
                micStreamRef.current.getTracks().forEach(track => track.stop());
                micStreamRef.current = null;
            }

            setIsMicActive(false);
            setCurrentDetectedNote(null);
            
            const lBar = document.getElementById('lobby-volume-bar');
            const gBar = document.getElementById('game-volume-bar');
            if (lBar) lBar.style.width = '0%';
            if (gBar) gBar.style.width = '0%';
            
            matchFramesRef.current = 0;
            lastDetectedNoteRef.current = null;
        }, []);

        const toggleMic = async () => {
            if (isMicActive) {
                stopMic();
                return;
            }
            
            const audioCtx = getGlobalAudioContext();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                
                stream.getTracks()[0].onended = () => {
                    stopMic();
                };

                micStreamRef.current = stream;
                const source = audioCtx.createMediaStreamSource(stream);
                
                const micGainNode = audioCtx.createGain();
                micGainNode.gain.value = 8.0; 
                
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                
                source.connect(micGainNode);
                micGainNode.connect(analyser);
                
                analyserRef.current = analyser;
                setIsMicActive(true);
                detectPitchLoop(analyser, audioCtx.sampleRate);
            } catch (err) {
                console.error("Mic error:", err);
                alert("無法存取麥克風，請確認您的裝置與瀏覽器設定已允許使用麥克風！");
            }
        };

        const detectPitchLoop = (analyser, sampleRate) => {
            const loop = () => {
                if (!micStreamRef.current) return;
                
                analyser.getFloatTimeDomainData(bufferRef.current);

                let rms = 0;
                for (let i = 0; i < bufferRef.current.length; i++) {
                    rms += bufferRef.current[i] * bufferRef.current[i];
                }
                rms = Math.sqrt(rms / bufferRef.current.length);
                
                const lBar = document.getElementById('lobby-volume-bar');
                const gBar = document.getElementById('game-volume-bar');
                const widthStr = Math.min(100, rms * 100 * 8) + '%';
                if (lBar) lBar.style.width = widthStr;
                if (gBar) gBar.style.width = widthStr;
                
                if (rms > 0.0015) {
                    const currentFreq = autoCorrelate(bufferRef.current, sampleRate);
                    if (currentFreq !== -1) {
                        const note = noteFromPitch(currentFreq);
                        if (note) {
                            setCurrentDetectedNote(note);
                            if (lastDetectedNoteRef.current === note) {
                                matchFramesRef.current++;
                            } else {
                                lastDetectedNoteRef.current = note;
                                matchFramesRef.current = 1;
                            }
                            
                            if (matchFramesRef.current >= 4 && matchFramesRef.current % 4 === 0) {
                                window.dispatchEvent(new CustomEvent('micNoteDetected', { detail: note }));
                            }
                        } else {
                            setCurrentDetectedNote(null);
                            lastDetectedNoteRef.current = null;
                            matchFramesRef.current = 0;
                        }
                    } else {
                        setCurrentDetectedNote(null);
                        lastDetectedNoteRef.current = null;
                        matchFramesRef.current = 0;
                    }
                } else {
                    setCurrentDetectedNote(null);
                    lastDetectedNoteRef.current = null;
                    matchFramesRef.current = 0;
                }
                
                pitchRafRef.current = requestAnimationFrame(loop);
            };
            loop();
        };
        // --------------------------------------------------

        const fetchLeaderboardData = async (isInitial = false) => {
            if (isInitial) {
                setIsInitialLoading(true);
            } else {
                setIsRefreshing(true);
            }
            try {
                const res = await fetch(`${SCRIPT_URL}?gameId=${encodeURIComponent(GAME_ID)}&t=${Date.now()}`);
                const data = await res.json();
                
                setLeaderboardAllTime(data.leaderboard || []);
                setLeaderboardToday(data.todayLeaderboard || []);
                
                setAssignedNotesData(data.assignedNotes || []);
                setClassList(data.classes || []);
                
            } catch (err) {
                console.error("無法取得後台資料", err);
            } finally {
                if (isInitial) {
                    setIsInitialLoading(false);
                } else {
                    setIsRefreshing(false);
                }
            }
        };

        useEffect(() => {
            fetchLeaderboardData(true);
        }, []);

        const isAssignedModeActive = loginState.mode === 'class' && assignedNotesData.length > 0;
        const isTeacherNotReady = loginState.mode === 'class' && assignedNotesData.length === 0;

        useEffect(() => {
            if (loginState.isLoggedIn && isAssignedModeActive) {
                const allNotes = [...ALL_TREBLE, ...ALL_BASS];
                const matchedIds = [];
                assignedNotesData.forEach(pitch => {
                    const note = allNotes.find(n => n.id.split('_')[1].toUpperCase() === pitch);
                    if (note) matchedIds.push(note.id);
                });
                
                if (matchedIds.length > 0) {
                    setSelectedNoteIds([...new Set(matchedIds)]);
                    setCurrentLevel('infinite'); 
                }
            }
        }, [loginState.isLoggedIn, isAssignedModeActive, assignedNotesData]);

        useEffect(() => {
            if (showLeaderboard) {
                setActiveLeaderboardTab(loginState.playerClass || '訪客');
            }
        }, [showLeaderboard, loginState.playerClass]);

        const currentLevelNotes = useMemo(() => {
            if (currentLevel === 'infinite') return [...ALL_TREBLE, ...ALL_BASS];
            return NOTE_DATABASE[currentLevel] || [];
        }, [currentLevel]);

        const dynamicKeys = useMemo(() => {
            if (!isGameMode || gameTargets.length === 0) return [];
            
            const octaves = gameTargets.map(t => parseInt(t.id.split('_')[1].slice(-1)));
            let minOct = Math.min(...octaves);
            let maxOct = Math.max(...octaves);
            
            if (!isFinite(minOct)) { minOct = 4; maxOct = 4; }

            const keys = [];
            const notesTemplate = [
                { name: 'C', hasBlack: true },
                { name: 'D', hasBlack: true },
                { name: 'E', hasBlack: false },
                { name: 'F', hasBlack: true },
                { name: 'G', hasBlack: true },
                { name: 'A', hasBlack: true },
                { name: 'B', hasBlack: false }
            ];

            for (let oct = minOct; oct <= maxOct; oct++) {
                notesTemplate.forEach(n => {
                    keys.push({ ...n, pitch: `${n.name}${oct}`, octave: oct });
                });
            }
            return keys;
        }, [isGameMode, gameTargets]);

        const getPracticeRangeText = () => {
            const active = [...ALL_TREBLE, ...ALL_BASS]
                .filter(n => selectedNoteIds.includes(n.id))
                .sort((a, b) => a.freq - b.freq);
            
            if(active.length === 0) return '無';
            
            const formatNote = (n) => `${n.name}${n.id.match(/\d/)[0]} (${SOLFEGE_MAP[n.name]})`;
            
            if (active.length <= 7) {
                return active.map(n => formatNote(n)).join('、');
            }
            
            const lowest = active[0];
            const highest = active[active.length - 1];
            return `${formatNote(lowest)} ~ ${formatNote(highest)} (共 ${active.length} 音)`;
        };

        const totalClicks = stats.correct + stats.wrong;
        const accuracy = totalClicks > 0 ? Math.round((stats.correct / totalClicks) * 100) : 0;

        const submitScore = async () => {
            setIsSubmitting(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        gameId: GAME_ID,
                        playerClass: loginState.playerClass,
                        name: loginState.name,
                        score: gameScore,
                        accuracy: accuracy,
                        maxCombo: maxCombo,
                        range: getPracticeRangeText(),
                        time: Number(gameTime)
                    })
                });
                
                setIsSubmitted(true);
                await fetchLeaderboardData(false);                 
            } catch (err) {
                console.error(err);
                alert("傳送成績失敗，請檢查網路連線。");
            }
            setIsSubmitting(false);
        };

        const handleLevelChange = (level) => {
            if (!isAssignedModeActive) setCurrentLevel(level);
        };

        const handleClefChange = (clef) => {
            if (isAssignedModeActive) return;
            setSelectedClefTab(clef);
            if (clef === 'treble') setCurrentLevel('treble_mid');
            else if (clef === 'bass') setCurrentLevel('bass_high'); 
            else setCurrentLevel('infinite');
        };

        const toggleIndividualNote = (note) => {
            if (isGameMode || isAssignedModeActive) return;
            playSound(getGlobalAudioContext(), 'note', note.freq);
            setSelectedNoteIds(prev => prev.includes(note.id) ? prev.filter(id => id !== note.id) : [...prev, note.id]);
        };

        const selectAllCurrentLevel = () => {
            if (isAssignedModeActive) return;
            const newIds = currentLevelNotes.map(n => n.id);
            setSelectedNoteIds(prev => Array.from(new Set([...prev, ...newIds])));
        };

        const clearAllCurrentLevel = () => {
            if (isAssignedModeActive) return;
            const idsToRemove = currentLevelNotes.map(n => n.id);
            setSelectedNoteIds(prev => prev.filter(id => !idsToRemove.includes(id)));
        };

        const resetAllSelections = () => {
            if (isAssignedModeActive) return;
            setSelectedNoteIds([]);
        };

        const startGame = () => {
            if (selectedNoteIds.length < 2) {
                setValidationShake(true);
                setTimeout(() => setValidationShake(false), 500);
                return;
            }

            setIsGameMode(true);
            setGameWon(false);
            setGameScore(0);
            setGameTime(0);
            setCombo(0);
            setMaxCombo(0);
            setStats({ correct: 0, wrong: 0 });
            setLasers([]);
            setCurrentTargetIndex(0);
            setWrongShake(false);
            setIsSubmitted(false); 
            
            const activeNotes = [...ALL_TREBLE, ...ALL_BASS].filter(n => selectedNoteIds.includes(n.id));
            
            // --- 💡 全新出題機制：洗牌平均發牌法 ---
            const TOTAL_QUESTIONS = 15; // 遊戲總題數
            let pool = [];

            // 1. 保證每個音符「盡量平均」出現
            const fullSets = Math.floor(TOTAL_QUESTIONS / activeNotes.length);
            const remainder = TOTAL_QUESTIONS % activeNotes.length;

            for (let i = 0; i < fullSets; i++) {
                pool.push(...activeNotes);
            }

            if (remainder > 0) {
                let shuffledActive = [...activeNotes].sort(() => Math.random() - 0.5);
                pool.push(...shuffledActive.slice(0, remainder));
            }

            // 2. 打亂池子裡的所有題目 (Fisher-Yates)
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // 3. 防呆機制
            if (activeNotes.length > 1) {
                for (let i = 1; i < pool.length; i++) {
                    if (pool[i].id === pool[i - 1].id) {
                        for (let j = i + 1; j < pool.length; j++) {
                            if (pool[j].id !== pool[i].id) {
                                [pool[i], pool[j]] = [pool[j], pool[i]];
                                break;
                            }
                        }
                    }
                }
            }

            const targets = pool.map((note, index) => ({
                ...note,
                uid: `${note.id}-${index}-${Date.now()}`,
                isExploding: false
            }));
            // -----------------------------------------
            
            setGameTargets(targets);
            if (timerRef.current) clearInterval(timerRef.current);
            const start = Date.now();
            startTimeRef.current = start; 
            timerRef.current = setInterval(() => setGameTime(((Date.now() - start) / 1000).toFixed(2)), 50);
        };

        const fireLaser = (targetUid, targetPitch) => {
            const targetEl = targetRefs.current[targetUid];
            const keyEl = document.getElementById(`piano-key-${targetPitch}`);
            if (!targetEl || !keyEl) return;
            
            try {
                const targetRect = targetEl.getBoundingClientRect();
                const keyRect = keyEl.getBoundingClientRect();
                const startX = keyRect.left + keyRect.width / 2;
                const startY = keyRect.top; 
                const targetX = targetRect.left + targetRect.width / 2;
                const targetY = targetRect.top + targetRect.height / 2;

                const newLaser = { id: Date.now(), startX, startY, targetX, targetY };
                setLasers(prev => [...prev, newLaser]);
                
                if (!isMicActive) {
                    playSound(getGlobalAudioContext(), 'laser');
                }

                setTimeout(() => setLasers(prev => prev.filter(l => l.id !== newLaser.id)), 300);
            } catch (e) {}
        };

        // --- 核心輸入判斷邏輯 (支援點擊與麥克風) ---
        const processInput = useCallback((inputPitch, source) => {
            setGameTargets(prevTargets => {
                const currentTarget = prevTargets[currentTargetIndex];
                if (!currentTarget || currentTarget.isExploding) return prevTargets;

                const targetPitch = currentTarget.id.split('_')[1];

                let isMatch = false;

                if (source === 'mic') {
                    const targetBase = targetPitch.replace(/[0-9]/g, '');
                    const targetOct = parseInt(targetPitch.replace(/[^0-9]/g, ''), 10);
                    const inputBase = inputPitch.replace(/[0-9]/g, '');
                    const inputOct = parseInt(inputPitch.replace(/[^0-9]/g, ''), 10);
                    
                    if (isRecorderMode) {
                        isMatch = (inputBase === targetBase) && (inputOct === targetOct + 1);
                    } else {
                        isMatch = (inputPitch === targetPitch);
                    }
                } else {
                    isMatch = (inputPitch === targetPitch);
                }

                if (isMatch) {
                    setCombo(c => { const nc = c + 1; setMaxCombo(mc => Math.max(mc, nc)); return nc; });
                    setStats(s => ({ ...s, correct: s.correct + 1 }));
                    
                    setGameScore(s => {
                        const newCombo = combo + 1;
                        return s + 100 + ((newCombo - 1) * 50);
                    });

                    fireLaser(currentTarget.uid, targetPitch); 
                    
                    if (source !== 'mic') {
                        playSound(getGlobalAudioContext(), 'note', currentTarget.freq);
                    }
                    setTimeout(() => { if(source !== 'mic') playSound(getGlobalAudioContext(), 'explosion') }, 150);
                    
                    const newTargets = [...prevTargets];
                    newTargets[currentTargetIndex] = { ...currentTarget, isExploding: true };
                    
                    setTimeout(() => {
                        setCurrentTargetIndex(prev => {
                            if (prev + 1 < gameTargets.length) {
                                return prev + 1;
                            } else {
                                // 速度挑戰關鍵：結算扣分 (班級版專屬邏輯)
                                const end = Date.now();
                                const finalSecondsFloat = (end - startTimeRef.current) / 1000;
                                const finalSeconds = finalSecondsFloat.toFixed(2); 

                                setGameWon(true);
                                clearInterval(timerRef.current);

                                    className={`relative flex flex-col items-center justify-center w-52 h-40 md:w-72 md:h-52 backdrop-blur-xl border-[3px] rounded-3xl transition-all duration-200 ${wrongShake ? 'border-red-500 shake-error bg-red-900/80' : 'bg-slate-800/80 border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.4)]'}`}
                                >
                                    <StaffNote note={currentNoteObj} svgScale="scale-110 md:scale-125" isTarget={true} />
                                    {wrongShake && <div className="absolute inset-0 flex items-center justify-center text-red-400 opacity-80 pointer-events-none"><Icons.X className="w-20 h-20 md:w-32 md:h-32" strokeWidth={3}/></div>}
                                </div>
                            </div>
                        )}
                    </div>
                ) : (
                    <div className="absolute inset-0 overflow-y-auto custom-scrollbar p-2 md:p-4 flex flex-col items-center">
                        {isAssignedModeActive && (
                            <div className="w-full max-w-5xl mb-2 animate-pop mt-2">
                                <div className="bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-bold py-2.5 px-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.5)] flex justify-center items-center gap-2 font-zh text-sm md:text-base text-center">
                                    <Icons.Sparkles className="w-5 h-5"/>
                                    <span>老師已指定測驗範圍，請按下開始進行挑戰！</span>
                                </div>
                            </div>
                        )}
                        
                        <div className="w-full max-w-5xl flex flex-col md:flex-row justify-between items-center mb-3 px-2 border-b border-white/10 pb-3 gap-2">
                            <span className="text-yellow-400 font-bold font-zh bg-black/40 px-4 py-2 rounded-lg border border-yellow-500/50 text-[11px] md:text-sm">
                                🎯 {isAssignedModeActive ? '指定題庫' : '已選題庫'}：{selectedNoteIds.length} 個音符
                            </span>
                            <div className={`flex gap-2 flex-wrap justify-center ${isAssignedModeActive ? 'hidden' : ''}`}>
                                <button onClick={selectAllCurrentLevel} className="px-3 py-1.5 bg-blue-600/30 text-blue-200 rounded-lg font-bold font-zh border border-blue-500/30 text-[11px] flex items-center"><Icons.CheckCircle2 className="w-3.5 h-3.5 mr-1"/> 全選</button>
                                <button onClick={clearAllCurrentLevel} className="px-3 py-1.5 bg-red-600/30 text-red-200 rounded-lg font-bold font-zh border border-red-500/30 text-[11px] flex items-center"><Icons.X className="w-3.5 h-3.5 mr-1"/> 清空</button>
                                <button onClick={resetAllSelections} className="px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg font-bold font-zh border border-slate-500 text-[11px] flex items-center"><Icons.Trash2 className="w-3.5 h-3.5 mr-1"/> 重置</button>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 min-[420px]:grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4 w-fit mx-auto mb-8">
                            {currentLevelNotes.map(item => renderSetupNoteCard(item))}
                        </div>

                        <div className="sticky bottom-6 md:bottom-8 z-50 flex justify-center w-full max-w-xs md:max-w-sm mx-auto mt-auto pointer-events-none pb-2">
                            <button onClick={startGame} disabled={startBtnDisabled} className={`pointer-events-auto w-full h-14 md:h-16 text-base md:text-xl rounded-full font-bold transition-all flex items-center justify-center gap-2 font-zh shadow-[0_15px_40px_rgba(0,0,0,0.8)]
                                ${startBtnDisabled ? 'bg-slate-800 border border-slate-600 text-slate-500 shadow-none' : validationShake ? 'bg-red-500 text-white shake-error' : 'bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 border border-fuchsia-400/50 text-white hover:-translate-y-1 active:translate-y-1 active:scale-95'}
                            `}>
                                {!startBtnDisabled && <Icons.Gamepad2 className="w-5 h-5 md:w-6 md:h-6" />}
                                {startBtnText}
                            </button>
                        </div>
                       </div>
                )}
            </div>

            <div className="relative z-30 w-full px-1 pt-2 pb-10 md:px-4 md:pt-4 md:pb-16 flex flex-col items-center gap-2 bg-gradient-to-t from-slate-950 via-slate-900/95 to-transparent shrink-0">
                {isGameMode && (
                    <div className="absolute -top-5 md:-top-6 flex gap-1.5 md:gap-3 text-[10px] md:text-sm font-mono font-bold z-40 items-center w-full justify-between px-2 md:px-4 max-w-6xl">
                        
                        <div className="flex gap-1.5 md:gap-3">
                            <button onClick={() => { setIsGameMode(false); clearInterval(timerRef.current); }} className="px-2 md:px-3 py-1.5 md:py-2 bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 rounded-lg md:rounded-xl border border-slate-600 flex items-center gap-1 md:gap-1.5 font-zh transition-all shadow-lg active:scale-95">
                                <Icons.ArrowLeft className="w-3.5 h-3.5 md:w-4 md:h-4" />
                                <span className="hidden min-[400px]:inline">返回</span>
                            </button>

                            <div className={`px-2.5 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl border shadow-lg transition-colors ${wrongShake ? 'bg-red-900 text-red-200 border-red-500' : 'bg-slate-800 text-yellow-400 border-yellow-500/30'}`}>
                                SCORE: {gameScore}
                            </div>

                            <div className="bg-slate-800 text-cyan-300 px-2.5 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl border border-cyan-500/30 shadow-lg flex items-center">
                                <Icons.Timer className="w-3.5 h-3.5 md:w-4 md:h-4 inline mr-1"/>{gameTime}s
                            </div>
                        </div>

                        {/* --- 遊戲中麥克風控制小面板 --- */}
                        <div className="flex gap-1 md:gap-3 items-center">
                            
                            <div className={`flex items-center gap-1 px-1.5 md:px-2 py-1.5 md:py-2 rounded-lg md:rounded-xl backdrop-blur-md border shadow-lg transition-colors ${isRecorderMode ? 'bg-emerald-900/80 border-emerald-500' : 'bg-slate-800/90 border-slate-500'}`}>
                                <input 
                                    type="checkbox" 
                                    id="in-game-recorder-checkbox"
                                    checked={isRecorderMode}
                                    onChange={(e) => setIsRecorderMode(e.target.checked)}
                                    className="w-3 h-3 md:w-3.5 md:h-3.5 accent-emerald-500 cursor-pointer"
                                />
                                <label htmlFor="in-game-recorder-checkbox" className="text-[9px] md:text-xs text-white font-zh cursor-pointer whitespace-nowrap select-none">
                                    <span className="hidden min-[420px]:inline">直笛</span>(+8度)
                                </label>
                            </div>

                            {isMicActive && (
                                <div className="hidden min-[500px]:flex flex-col justify-center px-2 py-0.5 bg-slate-800/90 border border-emerald-500/50 rounded-xl shadow-lg w-24 md:w-32">
                                    <div className="flex justify-between items-center text-[9px] md:text-[10px] text-slate-300 font-zh mb-0.5">
                                        <span>音量</span>
                                        <span className="text-emerald-400 font-bold">{currentDetectedNote || '-'}</span>
                                    </div>
                                    <div className="w-full h-1.5 bg-slate-900 rounded-full overflow-hidden border border-slate-700/50">
                                        <div id="game-volume-bar" className="h-full bg-emerald-400 transition-all duration-75" style={{ width: '0%' }}></div>
                                    </div>
                                </div>
                            )}

                            <button onClick={toggleMic} className={`relative px-2 md:px-3 py-1.5 md:py-2 rounded-lg md:rounded-xl backdrop-blur-md border flex items-center gap-1 md:gap-1.5 font-zh transition-all shadow-lg active:scale-95 ${isMicActive ? 'bg-emerald-500 border-emerald-400 text-white mic-active-pulse' : 'bg-slate-800/90 border-slate-500 text-slate-400 hover:bg-slate-700 hover:text-white'}`}>
                                {isMicActive ? <Icons.Mic className="w-3.5 h-3.5 md:w-4 md:h-4" /> : <Icons.MicOff className="w-3.5 h-3.5 md:w-4 md:h-4" />}
                                <span className="hidden min-[400px]:inline">{isMicActive ? '監聽中' : '已關閉'}</span>
                            </button>

                            <button onClick={() => setShowKeyboardHints(!showKeyboardHints)} className={`px-2 md:px-3 py-1.5 md:py-2 text-white rounded-lg md:rounded-xl backdrop-blur-md border flex items-center gap-1 md:gap-1.5 font-zh transition-all shadow-lg active:scale-95 ${!showKeyboardHints ? 'bg-fuchsia-600/90 border-fuchsia-400' : 'bg-slate-800/90 border-slate-500 hover:bg-slate-700'}`}>
                                {showKeyboardHints ? <Icons.EyeOff className="w-3.5 h-3.5 md:w-4 md:h-4" /> : <Icons.Eye className="w-3.5 h-3.5 md:w-4 md:h-4" />}
                                <span className="hidden min-[400px]:inline">{showKeyboardHints ? '隱藏' : '提示'}</span>
                            </button>
                        </div>
                        {/* ------------------------------- */}

                    </div>
                )}
                {isGameMode && (
                    <div className="w-full px-1 md:px-4 h-36 md:h-44 relative mb-3">
                        <div className="w-full max-w-6xl mx-auto h-full flex relative shadow-2xl rounded-b-xl">
                            <div className="absolute top-0 left-0 right-0 h-3 md:h-4 bg-red-800 rounded-t-sm z-0"></div>
                            {dynamicKeys.map((k, index) => {
                                // 判斷是否被麥克風選中
                                const isMicHighlight = isMicActive && currentDetectedNote && (
                                    isRecorderMode 
                                    ? (currentDetectedNote.replace(/[0-9]/g, '') === k.name && parseInt(currentDetectedNote.replace(/[^0-9]/g, ''), 10) - 1 === parseInt(k.pitch.replace(/[^0-9]/g, ''), 10))
                                    : (currentDetectedNote === k.pitch)
                                );

                                return (
                                <div key={k.pitch} className="relative flex pt-2 md:pt-3 flex-1 min-w-0">
                                    <button
                                        id={`piano-key-${k.pitch}`}
                                        onClick={() => handleNoteInput(k.pitch)}
                                        className={`w-full h-full border flex flex-col justify-end items-center pb-2 md:pb-4 transition-all z-10 relative overflow-hidden
                                            ${index === 0 ? 'rounded-bl-lg' : ''} 
                                            ${index === dynamicKeys.length - 1 ? 'rounded-br-lg' : ''}
                                            ${isMicHighlight ? 'bg-emerald-100 border-emerald-400 shadow-[inset_0_-10px_20px_rgba(16,185,129,0.3)] translate-y-1' : wrongShake ? 'bg-slate-300 text-slate-500 border-slate-300' : 'bg-white border-slate-300 text-slate-800 hover:bg-fuchsia-50 active:bg-slate-200 active:translate-y-1'}
                                        `}
                                        style={!isMicHighlight ? { boxShadow: 'inset 0 -6px 10px rgba(0,0,0,0.15)' } : {}}
                                        disabled={currentNoteObj?.isExploding}
                                    >
                                        <div className="flex flex-col items-center justify-end h-full pointer-events-none">
                                            {k.pitch === 'C4' && (
                                                <div className="flex flex-col items-center mb-1.5">
                                                    <div className="w-1.5 h-1.5 md:w-2 md:h-2 bg-red-500 rounded-full shadow-red-500/50"></div>
                                                    <span className="text-[8px] md:text-[11px] font-bold text-red-600 bg-red-100/90 px-0.5 md:px-1.5 rounded mt-0.5 font-zh hidden min-[500px]:block shrink-0">中央 Do</span>
                                                </div>
                                            )}
                                            {showKeyboardHints && (
                                                <>
                                                    <span className={`text-sm sm:text-xl md:text-3xl lg:text-4xl font-bold leading-none shrink-0 ${isMicHighlight ? 'text-emerald-600' : ''}`}>{k.name}</span>
                                                    <span className={`text-[8px] md:text-xs font-zh mt-1 hidden sm:block shrink-0 ${isMicHighlight ? 'text-emerald-500' : 'text-slate-500'}`}>{SOLFEGE_MAP[k.name]}</span>
                                                </>
                                            )}
                                        </div>
                                    </button>
                                    {k.hasBlack && (
                                        <div className="absolute top-1.5 md:top-2 right-[-27.5%] w-[55%] h-[55%] md:h-[60%] bg-gradient-to-b from-slate-800 to-black rounded-b-md md:rounded-b-lg z-20 pointer-events-none shadow-xl"></div>
                                    )}
                                </div>
                            )})}
                        </div>
                    </div>
                )}
            </div>

            {gameWon && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md animate-pop p-4">
                    <div className="bg-slate-900 border-2 border-fuchsia-400 rounded-3xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl">
                        <Icons.Sparkles className="w-16 h-16 text-fuchsia-400 mx-auto mb-4 animate-bounce" />
                        <h2 className="text-2xl md:text-3xl font-bold text-white mb-2 font-zh">太棒了，{loginState.name}！</h2>
                        <p className="text-sm md:text-base text-slate-300 mb-5 font-zh">你成功擊落了 15 個音符！</p>
                        
                        <div className="grid grid-cols-2 gap-3 mb-6 bg-black/30 p-4 rounded-xl border border-white/5">
                            <div><div className="text-xs text-slate-400 font-zh">耗時</div><div className="text-xl md:text-2xl font-bold text-cyan-300">{gameTime}s</div></div>
                            <div><div className="text-xs text-slate-400 font-zh">準確率</div><div className="text-xl md:text-2xl font-bold text-emerald-400">{accuracy}%</div></div>
                            <div><div className="text-xs text-slate-400 font-zh">連擊</div><div className="text-xl md:text-2xl font-bold text-orange-400">{maxCombo}</div></div>
                            <div><div className="text-xs text-slate-400 font-zh">最終分數</div><div className="text-xl md:text-2xl font-bold text-yellow-400">{gameScore}</div></div>
                        </div>

                        {!isSubmitted ? (
                            <button 
                                onClick={submitScore} 
                                disabled={isSubmitting}
                                className={`w-full mb-4 py-3.5 rounded-xl font-bold font-zh text-lg text-white transition-all ${isSubmitting ? 'bg-slate-700' : 'bg-gradient-to-r from-blue-600 to-cyan-500 shadow-cyan-500/30'}`}
                            >
                                {isSubmitting ? '傳送中...' : '登錄成績並看排行'}
                            </button>
                        ) : (
                            <div className="mb-4 p-3 bg-emerald-900/40 border border-emerald-500/50 rounded-xl text-center">
                                <div className="text-emerald-400 font-bold mb-2 font-zh flex justify-center items-center gap-1.5">
                                    <Icons.CheckCircle2 className="w-4 h-4"/> 成績已成功上傳！
                                </div>
                                <button 
                                    onClick={() => setShowLeaderboard(true)} 
                                    className="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white rounded-lg text-sm font-zh transition-colors flex items-center justify-center gap-1.5 w-full shadow-lg"
                                >
                                    <Icons.Trophy className="w-4 h-4"/> 顯示排行榜
                                </button>
                            </div>
                        )}
                        <div className="flex gap-2">
                            <button 
                                onClick={() => startGame()} 
                                disabled={isSubmitting}
                                className={`flex-1 py-3 font-bold rounded-xl text-sm font-zh transition-colors ${isSubmitting ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-fuchsia-500 hover:bg-fuchsia-400 text-white'}`}
                            >
                                再挑戰
                            </button>
                            <button 
                                onClick={() => { setIsGameMode(false); setGameWon(false); }} 
                                disabled={isSubmitting}
                                className={`flex-1 py-3 font-bold rounded-xl text-sm font-zh transition-colors ${isSubmitting ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-white/10 hover:bg-white/20 text-white'}`}
                            >
                                回大廳
                            </button>
                        </div>             
                        
                    </div>
                </div>
            )}
            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PitchShooterGame />);
    </script>
</body>
</html>
